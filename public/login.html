<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EA Platform — เข้าสู่ระบบ</title>
  <link rel="stylesheet" href="/admin.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      width: 100%; max-width: 380px; margin: 1rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.75rem; box-shadow: var(--shadow);
    }
    .login-card h1 { margin: 0 0 0.25rem; font-size: 1.35rem; }
    .login-card p { margin: 0 0 1.25rem; color: var(--muted); font-size: 0.88rem; }
    .login-card label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.35rem; }
    .login-card input {
      width: 100%; margin-bottom: 1rem; padding: 0.6rem 0.75rem;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text); font-size: 1rem;
    }
    .login-card .btn { width: 100%; margin-top: 0.25rem; }
    .login-err { color: var(--bad); font-size: 0.85rem; margin-bottom: 0.75rem; min-height: 1.2em; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>EA Platform</h1>
    <p>แผงควบคุม Operator</p>
    <div id="loginErr" class="login-err"></div>
    <form id="loginForm">
      <label for="user">ชื่อผู้ใช้</label>
      <input id="user" name="user" type="text" autocomplete="username" required />
      <label for="password">รหัสผ่าน</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button type="submit" class="btn">เข้าสู่ระบบ</button>
    </form>
  </div>
  <script src="/login.js"></script>
</body>
</html>
